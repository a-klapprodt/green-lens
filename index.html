<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Green Lens</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background: linear-gradient(to bottom right,#f0fdf4,#dbeafe);
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

header{
text-align:center;
margin-bottom:40px;
}

h1{
font-size:48px;
color:#14532d;
}

p{
color:#374151;
font-size:18px;
}

.card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin-top:30px;
}

label{
font-weight:600;
display:block;
margin-bottom:10px;
font-size:18px;
}

input[type=range]{
width:100%;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>The Green Lens</h1>
<p>
Rainfall-induced slope instability occurs when increased pore water pressure
reduces effective stress and shear strength. This dashboard visualizes how
rainfall influences the Factor of Safety over time.
</p>
</header>

<div class="card">

<label>
Factor of Safety Threshold: <span id="thresholdValue">1.30</span>
</label>

<input
type="range"
min="0.8"
max="2"
step="0.01"
value="1.3"
id="thresholdSlider"
/>

</div>

<div class="card">

<canvas id="fsChart" height="120"></canvas>

</div>

</div>

<script>

window.onload = function(){

const dates = [
"Feb 10","Feb 11","Feb 12","Feb 13","Feb 14",
"Feb 15","Feb 16","Feb 17","Feb 18","Feb 19"
]

const factorSafety = [
1.62,1.59,1.55,1.52,1.48,
1.46,1.42,1.39,1.34,1.30
]

const ctx = document.getElementById("fsChart").getContext("2d")

new Chart(ctx,{
type:"line",
data:{
labels:dates,
datasets:[{
label:"Factor of Safety",
data:factorSafety,
borderWidth:3,
tension:0.3
}]
},
options:{
responsive:true,
scales:{
y:{
min:0.8,
max:2
}
}
}
})

const slider=document.getElementById("thresholdSlider")
const valueLabel=document.getElementById("thresholdValue")

slider.addEventListener("input",()=>{
valueLabel.textContent=parseFloat(slider.value).toFixed(2)
})

}

</script>

</body>
</html>
